  /* ============================================================ */
  /*  STORAGE LAYER (LocalStorage hoje, Supabase amanhã)           */
  /* ============================================================ */
  // Abstração: troca-se só esta camada quando migrar para Supabase/Firebase.
  const STORAGE_PREFIX = 'higis:v1:';
  const storage = {
    get(key, fallback) {
      try {
        const raw = localStorage.getItem(STORAGE_PREFIX + key);
        return raw == null ? fallback : JSON.parse(raw);
      } catch { return fallback; }
    },
    set(key, value) {
      try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); return true; }
      catch { return false; }
    },
    remove(key) {
      try { localStorage.removeItem(STORAGE_PREFIX + key); } catch {}
    },
    clear() {
      try {
        Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX)).forEach(k => localStorage.removeItem(k));
      } catch {}
    },
    export() {
      const out = {};
      try {
        Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX)).forEach(k => {
          out[k.replace(STORAGE_PREFIX, '')] = JSON.parse(localStorage.getItem(k));
        });
      } catch {}
      return out;
    },
    import(data) {
      try {
        Object.entries(data).forEach(([k, v]) => localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(v)));
        return true;
      } catch { return false; }
    },
  };

  // Hook: estado persistido em localStorage
  function usePersistedState(key, initial) {
    const [state, setState] = useState(() => {
      const saved = storage.get(key);
      return saved !== undefined && saved !== null ? saved : (typeof initial === 'function' ? initial() : initial);
    });
    useEffect(() => { storage.set(key, state); }, [key, state]);
    return [state, setState];
  }

  // Hook: detecta breakpoints
  function useResponsive() {
    const get = () => {
      const w = window.innerWidth;
      return { isMobile: w < 768, isTablet: w >= 768 && w < 1024, isDesktop: w >= 1024, width: w };
    };
    const [bp, setBp] = useState(get);
    useEffect(() => {
      const onResize = () => setBp(get());
      window.addEventListener('resize', onResize);
      return () => window.removeEventListener('resize', onResize);
    }, []);
    return bp;
  }

  // Hook: detecta se o app já está instalado / pode ser instalado (Android/Desktop)
  function useInstallPrompt() {
    const [installable, setInstallable] = useState(!!window.__higisInstallEvent);
    const [installed, setInstalled] = useState(
      window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true // iOS
    );
    useEffect(() => {
      const onInstallable = () => setInstallable(true);
      const onInstalled = () => { setInstalled(true); setInstallable(false); };
      window.addEventListener('higis:installable', onInstallable);
      window.addEventListener('appinstalled', onInstalled);
      return () => {
        window.removeEventListener('higis:installable', onInstallable);
        window.removeEventListener('appinstalled', onInstalled);
      };
    }, []);
    const promptInstall = async () => {
      const evt = window.__higisInstallEvent;
      if (!evt) return 'unavailable';
      const result = await evt.prompt();
      window.__higisInstallEvent = null;
      setInstallable(false);
      return result?.outcome || 'dismissed';
    };
    return { installable, installed, promptInstall };
  }

  // Hook: data formatada
  function useDate() {
    const [now, setNow] = useState(new Date());
    useEffect(() => {
      const t = setInterval(() => setNow(new Date()), 60000);
      return () => clearInterval(t);
    }, []);
    return now;
  }

  const EditableValue = ({ value, onCommit, type = 'number', prefix = '', suffix = '', className = '' }) => {
    const [editing, setEditing] = useState(false);

    useEffect(() => { setV(String(value ?? '')); }, [value]);
    const commit = () => {
      setEditing(false);
      const parsed = type === 'number' ? (parseFloat(v) || 0) : v;
      if (parsed !== value) onCommit(parsed);
    };
    return editing ? (
      <input
        type={type}
        autoFocus
        value={v}
        onChange={e => setV(e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') { setV(String(value ?? '')); setEditing(false); } }}
        step={type === 'number' ? '0.01' : undefined}
        className="w-full px-2 py-1 rounded border-2 border-gold bg-gold-light text-navy font-semibold text-sm num"

              <input type="text" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} placeholder="Nome do cliente" className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 text-navy" />

              <input type="text" value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} placeholder="Bairro, indicação..." className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 text-navy" />
            </div>

          <button onClick={registrar} disabled={!parseFloat(form.valor)} className="mt-4 w-full md:w-auto bg-navy hover:bg-navy-800 disabled:bg-neutral-300 text-gold-50 font-bold text-sm px-6 py-2.5 rounded-lg transition-colors inline-flex items-center gap-2">

            Vendas Registradas ({vendas.length})
          </SectionTitle>
          {vendas.length === 0 ? (
            <Card className="text-center text-sm text-neutral-400 py-8">
              <i className="ti ti-database-off text-3xl block mb-2" aria-hidden="true" />
              Nenhuma venda registrada. Comece pelo primeiro Combo Premium do mês.
            </Card>
          ) : (
            <div className="space-y-2">
              {vendas.slice(0, 20).map(v => (
                <Card key={v.id} padding="p-3" className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gold-light flex items-center justify-center shrink-0">
                    <i className="ti ti-receipt-2 text-gold" aria-hidden="true" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-navy truncate">{v.cliente !== '—' ? v.cliente : v.servicoLabel}</div>

  /* ============================================================ */
  /*  SECTION: TABELAS                                             */
  /* ============================================================ */
  function SectionTabelas() {
    const [sub, setSub] = useState(0);
    const [vdData, setVdData] = usePersistedState('vdData', VENDA_DIRETA.map((it, i) => ({ ...it, id: i })));
    const [ptData, setPtData] = usePersistedState('ptData', PARCEIROS_TAB.map((it, i) => ({ ...it, id: i })));
    const [catVD, setCatVD] = useState('Todos');
    const [catPT, setCatPT] = useState('Todos');
    const [busca, setBusca] = useState('');
    const [showAdd, setShowAdd] = useState(false);
    const [showAddPt, setShowAddPt] = useState(false);
    const [novo, setNovo] = useState({ cat: 'Sofás', nome: '', tempo: '', custo: '', precoPraticado: '' });
    const [novoPt, setNovoPt] = useState({ cat: 'Sofás', nome: '', unid: '—', custo: '', preco: '', comissao: '', autoComissao: true });

    const vdFilt = useMemo(() => vdData.filter(i =>
      (catVD === 'Todos' || i.cat === catVD) &&
      i.nome.toLowerCase().includes(busca.toLowerCase())
    ), [catVD, busca, vdData]);

    const ptFilt = useMemo(() => ptData.filter(i => catPT === 'Todos' || i.cat === catPT), [catPT, ptData]);

    const updateVd = (id, field, val) => setVdData(rows => rows.map(r => r.id === id ? { ...r, [field]: val } : r));
    const delVd = id => setVdData(rows => rows.filter(r => r.id !== id));
    const addVd = () => {
      if (!novo.nome) return;
      setVdData(rows => [...rows, { ...novo, id: Date.now(), custo: parseFloat(novo.custo) || 0, precoPraticado: parseFloat(novo.precoPraticado) || 0 }]);
      setNovo({ cat: 'Sofás', nome: '', tempo: '', custo: '', precoPraticado: '' });
      setShowAdd(false);
    };
    const resetVd = () => { if (confirm('Restaurar tabela original? Suas edições serão perdidas.')) setVdData(VENDA_DIRETA.map((it, i) => ({ ...it, id: i }))); };

    // Parceiros — editáveis
    const updatePt = (id, field, val) => {
      setPtData(rows => rows.map(r => {
        if (r.id !== id) return r;
        const updated = { ...r, [field]: val };
        // Se editou o preço, recalcula comissão automaticamente (15%) — exceto se já foi customizada
        if (field === 'preco' && r.comissaoAuto !== false) {
          updated.comissao = Number((val * 0.15).toFixed(2));
        }
        if (field === 'comissao') {
          updated.comissaoAuto = false; // marca como customizada
        }
        return updated;
      }));
    };
    const delPt = id => { if (confirm('Remover este serviço da tabela de parceiros?')) setPtData(rows => rows.filter(r => r.id !== id)); };
    const addPt = () => {
      if (!novoPt.nome) { alert('Informe o nome do serviço.'); return; }
      const preco = parseFloat(novoPt.preco) || 0;
      const comissao = novoPt.autoComissao ? Number((preco * 0.15).toFixed(2)) : (parseFloat(novoPt.comissao) || 0);
      setPtData(rows => [...rows, {
        id: Date.now(),
        cat: novoPt.cat,
        nome: novoPt.nome,
        unid: novoPt.unid || '—',
        custo: parseFloat(novoPt.custo) || 0,
        preco,
        comissao,
        comissaoAuto: novoPt.autoComissao,
      }]);
      setNovoPt({ cat: 'Sofás', nome: '', unid: '—', custo: '', preco: '', comissao: '', autoComissao: true });
      setShowAddPt(false);
    };
    const resetPt = () => { if (confirm('Restaurar tabela de parceiros original? Suas edições serão perdidas.')) setPtData(PARCEIROS_TAB.map((it, i) => ({ ...it, id: i }))); };

    return (
      <div className="space-y-4 fade-up">
        {/* Sub-tabs */}
        <div className="flex gap-2">
          <Chip active={sub === 0} onClick={() => setSub(0)}>Venda Direta</Chip>
          <Chip active={sub === 1} onClick={() => setSub(1)}>Parceiros (15%)</Chip>
        </div>

        {sub === 0 && (
          <>
            {/* Filtros */}
            <div className="flex flex-col md:flex-row md:items-center gap-3">
              <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 flex-1">
                {CATS_VD.map(c => <Chip key={c} active={catVD === c} onClick={() => setCatVD(c)}>{c}</Chip>)}
              </div>
              <input type="text" placeholder="Buscar serviço..." value={busca} onChange={e => setBusca(e.target.value)} className="text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-white text-navy w-full md:w-64" />
              <div className="flex gap-2">
                <button onClick={() => setShowAdd(true)} className="bg-navy text-gold-50 text-sm font-semibold px-4 py-2 rounded-lg inline-flex items-center gap-1.5"><i className="ti ti-plus" aria-hidden="true"/>Novo</button>
                <button onClick={resetVd} className="text-xs text-neutral-500 hover:text-neutral-700">Restaurar</button>
              </div>
            </div>

            {/* Tabela */}
            <Card padding="p-0">
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-navy text-gold-50">
                    <tr>
                      <th className="text-left text-xs font-semibold px-3 py-3 tracking-wider">Serviço</th>
                      <th className="text-left text-xs font-semibold px-3 py-3 tracking-wider hidden md:table-cell">Tempo</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider">Custo</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider">Preço</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider hidden sm:table-cell">Lucro</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider">Margem</th>
                      <th className="w-8"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {vdFilt.map(r => {
                      const lucro = r.precoPraticado - r.custo;
                      const margem = r.precoPraticado > 0 ? (lucro / r.precoPraticado) * 100 : 0;
                      return (
                        <tr key={r.id} className="border-t border-neutral-100 hover:bg-sand-50">
                          <td className="px-3 py-2.5 min-w-[180px]">
                            <EditableValue value={r.nome} type="text" onCommit={v => updateVd(r.id, 'nome', v)} className="font-semibold text-navy text-sm" />
                            <div className="text-[10px] text-neutral-400 flex items-center gap-2 mt-0.5">
                              <select value={r.cat} onChange={e => updateVd(r.id, 'cat', e.target.value)} className="bg-transparent text-[10px] text-neutral-500 border-b border-dashed border-gold/40">
                                {CATS_VD.filter(c => c !== 'Todos').map(c => <option key={c}>{c}</option>)}
                              </select>
                              <span className="md:hidden">· <EditableValue value={r.tempo} type="text" onCommit={v => updateVd(r.id, 'tempo', v)} className="inline text-[10px]" /></span>
                            </div>
                          </td>
                          <td className="px-3 py-2.5 text-xs text-neutral-500 hidden md:table-cell num"><EditableValue value={r.tempo} type="text" onCommit={v => updateVd(r.id, 'tempo', v)} /></td>
                          <td className="px-3 py-2.5 text-right text-sm num"><EditableValue value={r.custo} onCommit={v => updateVd(r.id, 'custo', v)} prefix="R$ " /></td>
                          <td className="px-3 py-2.5 text-right text-sm num"><EditableValue value={r.precoPraticado} onCommit={v => updateVd(r.id, 'precoPraticado', v)} prefix="R$ " /></td>
                          <td className="px-3 py-2.5 text-right text-sm font-semibold hidden sm:table-cell num" style={{ color: C.green }}>{fmt(lucro)}</td>
                          <td className="px-3 py-2.5 text-right">
                            <Badge bg={margemBg(margem)} color={margemCor(margem)}>{pct(margem)}</Badge>
                          </td>
                          <td className="px-2"><button onClick={() => delVd(r.id)} className="text-neutral-300 hover:text-red-500"><i className="ti ti-trash text-sm" aria-hidden="true" /></button></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </Card>

            <Modal open={showAdd} onClose={() => setShowAdd(false)} title="Novo Serviço — Venda Direta">
              <div className="space-y-3">
                <div>
                  <label className="text-xs font-semibold text-neutral-600 block mb-1">Categoria</label>
                  <select value={novo.cat} onChange={e => setNovo({...novo, cat: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50">
                    {CATS_VD.filter(c => c !== 'Todos').map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-xs font-semibold text-neutral-600 block mb-1">Nome do serviço</label>
                  <input type="text" value={novo.nome} onChange={e => setNovo({...novo, nome: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50" />
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div><label className="text-xs font-semibold text-neutral-600 block mb-1">Tempo</label><input type="text" placeholder="1h30" value={novo.tempo} onChange={e => setNovo({...novo, tempo: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50" /></div>
                  <div><label className="text-xs font-semibold text-neutral-600 block mb-1">Custo</label><input type="number" step="0.01" value={novo.custo} onChange={e => setNovo({...novo, custo: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" /></div>
                  <div><label className="text-xs font-semibold text-neutral-600 block mb-1">Preço</label><input type="number" step="0.01" value={novo.precoPraticado} onChange={e => setNovo({...novo, precoPraticado: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" /></div>
                </div>
                <button onClick={addVd} className="w-full bg-navy text-gold-50 font-semibold py-2.5 rounded-lg">Adicionar Serviço</button>
              </div>
            </Modal>
          </>
        )}

        {sub === 1 && (
          <>
            <div className="flex flex-col md:flex-row md:items-center gap-3">
              <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 flex-1">
                {CATS_PT.map(c => <Chip key={c} active={catPT === c} onClick={() => setCatPT(c)}>{c}</Chip>)}
              </div>
              <div className="flex gap-2">
                <button onClick={() => setShowAddPt(true)} className="bg-navy text-gold-50 text-sm font-semibold px-4 py-2 rounded-lg inline-flex items-center gap-1.5 shrink-0"><i className="ti ti-plus" aria-hidden="true"/>Novo Serviço</button>
                <button onClick={resetPt} className="text-xs text-neutral-500 hover:text-neutral-700 shrink-0">Restaurar</button>
              </div>
            </div>

            <Alert type="premium" icon="ti-handshake">
              Comissão padrão de <strong>15%</strong> sobre o serviço executado. Ao editar o <strong>Preço</strong>, a comissão recalcula automaticamente — edite a comissão manualmente apenas para casos especiais (success fee de arquitetos, override). <strong>Success fee:</strong> 30% adicional em projetos de arquitetos e construtoras.
            </Alert>

            <Card padding="p-0">
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-navy text-gold-50">
                    <tr>
                      <th className="text-left text-xs font-semibold px-3 py-3 tracking-wider">Serviço</th>
                      <th className="text-left text-xs font-semibold px-3 py-3 tracking-wider hidden md:table-cell">Unidade</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider hidden sm:table-cell">Custo</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider">Preço</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider">Comissão</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider hidden md:table-cell">Líquido</th>
                      <th className="text-right text-xs font-semibold px-3 py-3 tracking-wider">Margem</th>
                      <th className="w-8"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {ptFilt.map(r => {
                      const liquido = r.preco - r.comissao;
                      const lucro = liquido - (r.custo || 0);
                      const margem = r.preco > 0 ? (lucro / r.preco) * 100 : 0;
                      return (
                        <tr key={r.id} className="border-t border-neutral-100 hover:bg-sand-50">
                          <td className="px-3 py-2.5 min-w-[180px]">
                            <EditableValue value={r.nome} type="text" onCommit={v => updatePt(r.id, 'nome', v)} className="font-semibold text-navy text-sm" />
                            <div className="text-[10px] text-neutral-400 flex items-center gap-2 mt-0.5">
                              <select value={r.cat} onChange={e => updatePt(r.id, 'cat', e.target.value)} className="bg-transparent text-[10px] text-neutral-500 border-b border-dashed border-gold/40">
                                {CATS_PT.filter(c => c !== 'Todos').map(c => <option key={c}>{c}</option>)}
                              </select>
                            </div>
                          </td>
                          <td className="px-3 py-2.5 hidden md:table-cell">
                            <select value={r.unid || '—'} onChange={e => updatePt(r.id, 'unid', e.target.value)} className="text-xs px-2 py-1 rounded border border-neutral-200 bg-white">
                              <option value="—">—</option>
                              <option value="por metro">por metro</option>
                              <option value="por m²">por m²</option>
                              <option value="por unidade">por unidade</option>
                              <option value="por hora">por hora</option>
                            </select>
                          </td>
                          <td className="px-3 py-2.5 text-right text-sm num hidden sm:table-cell"><EditableValue value={r.custo || 0} onCommit={v => updatePt(r.id, 'custo', v)} prefix="R$ " /></td>
                          <td className="px-3 py-2.5 text-right text-sm num font-semibold text-navy"><EditableValue value={r.preco} onCommit={v => updatePt(r.id, 'preco', v)} prefix="R$ " /></td>
                          <td className="px-3 py-2.5 text-right text-sm num text-amber-700">
                            <EditableValue value={r.comissao} onCommit={v => updatePt(r.id, 'comissao', v)} prefix="R$ " />
                            <div className="text-[9px] text-neutral-400">{r.comissaoAuto !== false ? '15% auto' : 'custom'}</div>
                          </td>
                          <td className="px-3 py-2.5 text-right text-sm font-bold num hidden md:table-cell" style={{color: C.green}}>{fmt(liquido)}</td>
                          <td className="px-3 py-2.5 text-right"><Badge bg={margemBg(margem)} color={margemCor(margem)}>{pct(margem)}</Badge></td>
                          <td className="px-2"><button onClick={() => delPt(r.id)} className="text-neutral-300 hover:text-red-500"><i className="ti ti-trash text-sm" aria-hidden="true" /></button></td>
                        </tr>
                      );
                    })}
                    {ptFilt.length === 0 && (
                      <tr><td colSpan={8} className="text-center text-sm text-neutral-400 py-8"><i className="ti ti-mood-empty text-2xl block mb-1" aria-hidden="true" />Nenhum serviço nesta categoria.</td></tr>

                    <label className="text-xs font-semibold text-neutral-600 block mb-1">Categoria</label>

                  </div>
                  <div>
                    <label className="text-xs font-semibold text-neutral-600 block mb-1">Unidade</label>
                    <select value={novoPt.unid} onChange={e => setNovoPt({...novoPt, unid: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50">
                      <option value="—">—</option>
                      <option value="por metro">por metro</option>
                      <option value="por m²">por m²</option>
                      <option value="por unidade">por unidade</option>

                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div><label className="text-xs font-semibold text-neutral-600 block mb-1">Custo</label><input type="number" step="0.01" placeholder="0,00" value={novoPt.custo} onChange={e => setNovoPt({...novoPt, custo: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" /></div>
                  <div><label className="text-xs font-semibold text-neutral-600 block mb-1">Preço</label><input type="number" step="0.01" placeholder="0,00" value={novoPt.preco} onChange={e => setNovoPt({...novoPt, preco: e.target.value, comissao: novoPt.autoComissao ? ((parseFloat(e.target.value)||0)*0.15).toFixed(2) : novoPt.comissao})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" /></div>
                  <div><label className="text-xs font-semibold text-neutral-600 block mb-1">Comissão</label><input type="number" step="0.01" disabled={novoPt.autoComissao} value={novoPt.autoComissao ? ((parseFloat(novoPt.preco)||0)*0.15).toFixed(2) : novoPt.comissao} onChange={e => setNovoPt({...novoPt, comissao: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num disabled:opacity-60" /></div>
                </div>
                <label className="flex items-center gap-2 text-xs text-neutral-600 cursor-pointer">
                  <input type="checkbox" checked={novoPt.autoComissao} onChange={e => setNovoPt({...novoPt, autoComissao: e.target.checked})} />

                <button onClick={addPt} className="w-full bg-navy text-gold-50 font-semibold py-2.5 rounded-lg inline-flex items-center justify-center gap-2"><i className="ti ti-handshake" aria-hidden="true" />Adicionar à Tabela Parceiros</button>

            </Modal>
          </>

      </div>

  }

    const SUBS = ['Blindagem', 'Residencial', 'Combos', 'B2B'];
    const datasets = [PLANOS_BLIND, PLANOS_RES, COMBOS, B2B];

      <div className="space-y-4 fade-up">
        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">

          {dataset.map(item => <PlanoCard key={item.id} item={item} tipo={SUBS[sub]} />)}

    const lucro = (item.preco || 0) - (item.custo || 0);

    return (
      <Card accent={item.cor} className="flex flex-col">
        <div className="flex items-start justify-between gap-3 mb-2">
          <div className="flex-1 min-w-0">
            <div className="font-display text-base md:text-lg font-bold text-navy leading-tight">{item.nome}</div>
            <div className="flex gap-1.5 flex-wrap mt-1.5">
              {(item.badge || item.tipo) && <Badge bg={item.bg} color={item.cor}>{item.badge || item.tipo}</Badge>}
              {item.freq && <Badge bg="#F7F7F7" color="#888">{item.freq}</Badge>}
            </div>
          </div>
          <div className="text-right shrink-0">
            <div className="font-display num text-xl md:text-2xl font-bold" style={{color: item.cor}}>{fmt(item.preco)}</div>
            {item.mensal && <div className="text-[10px] text-neutral-400 num">{fmt(item.mensal)}/mês</div>}
          </div>
        </div>

        {item.publico && <div className="text-xs text-neutral-500 italic mb-2">{item.publico}</div>}

        {item.composicao && (
          <div className="bg-sand-50 rounded-lg p-3 mb-3">
            <div className="text-[10px] font-semibold uppercase tracking-wider text-neutral-500 mb-1.5">Composição</div>
            {item.composicao.map((c, i) => (
              <div key={i} className="text-xs text-navy flex items-center gap-1.5 py-0.5">
                <i className="ti ti-circle-dot text-gold text-[10px]" aria-hidden="true" />{c}
              </div>
            ))}
          </div>
        )}

        <div className="grid grid-cols-3 gap-2 text-center my-2">
          <div><div className="text-[9px] uppercase tracking-wider text-neutral-400">Custo</div><div className="text-sm font-bold text-navy num">{fmt(item.custo)}</div></div>
          <div><div className="text-[9px] uppercase tracking-wider text-neutral-400">Lucro</div><div className="text-sm font-bold num" style={{color: C.green}}>{fmt(lucro)}</div></div>
          <div><div className="text-[9px] uppercase tracking-wider text-neutral-400">Margem</div><div className="text-sm font-bold num" style={{color: margemCor(margem)}}>{pct(margem)}</div></div>
        </div>

        {item.economia && <div className="text-xs text-amber-700 mb-2">💰 Economia vs avulso: <strong>{fmt(item.economia)}</strong></div>}
        {item.obs && (
          <button onClick={() => setOpen(!open)} className="text-[11px] text-neutral-500 text-left hover:text-navy mt-auto pt-2 border-t border-neutral-100">
            {open ? '▲ ocultar nota técnica' : '▼ ver nota técnica'}
          </button>
        )}
        {open && item.obs && <div className="text-xs text-neutral-600 italic mt-2 leading-relaxed">{item.obs}</div>}
      </Card>
    );
  }

  /* ============================================================ */
  /*  SECTION: SIMULADOR                                           */
  /* ============================================================ */
  function SectionSimulador() {
    const [tipo, setTipo] = useState('blindagem');
    const [horas, setHoras] = usePersistedState('sim.horas', 2);
    const [custoHora, setCustoHora] = usePersistedState('sim.custoHora', 147.61);
    const [margem, setMargem] = usePersistedState('sim.margem', 65);
    const [desconto, setDesconto] = useState(0);
    const [historico, setHistorico] = usePersistedState('sim.historico', []);
    const [nome, setNome] = useState('');

    const custoTotal = custoHora * horas;
    const precoBase = custoTotal / (1 - margem/100);
    const precoFinal = precoBase * (1 - desconto/100);
    const lucroFinal = precoFinal - custoTotal;
    const margemFinal = precoFinal > 0 ? (lucroFinal / precoFinal) * 100 : 0;

    const HORAS_ROW = [0.5, 1, 1.5, 2, 2.5, 3, 4, 5, 6, 8];

    const salvar = () => {
      const nova = {
        id: Date.now(),
        nome: nome || `Simulação ${historico.length + 1}`,
        tipo, horas, custoHora, margem, desconto,
        custo: custoTotal, preco: precoFinal, lucro: lucroFinal, margemReal: margemFinal,
        data: new Date().toISOString(),
      };
      setHistorico([nova, ...historico]);
      setNome('');
    };

    return (
      <div className="space-y-4 fade-up">
        <Alert type="info" icon="ti-calculator">
          Use o simulador para precificar serviços avulsos sob medida. <strong>Custo/hora padrão R$ 147,61</strong> = pró-labore + insumos médios + depreciação.
        </Alert>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <Card>
            <SectionTitle>Parâmetros</SectionTitle>
            <Slider label="Custo / hora" value={custoHora} min={50} max={400} step={5} onChange={setCustoHora} format={v => `R$ ${v}`} />
            <Slider label="Duração" value={horas} min={0.5} max={8} step={0.5} onChange={setHoras} format={v => `${v}h`} />
            <Slider label="Margem alvo" value={margem} min={20} max={80} step={5} onChange={setMargem} format={v => `${v}%`} />
            <Slider label="Desconto comercial" value={desconto} min={0} max={30} step={1} onChange={setDesconto} format={v => `${v}%`} />
          </Card>

          <Card accent={C.gold}>
            <SectionTitle>Resultado</SectionTitle>
            <div className="text-center py-3 border-y border-neutral-100 my-2">
              <div className="text-[10px] uppercase tracking-widest text-neutral-400">Preço Final</div>
              <div className="font-display num text-4xl font-bold text-gold-700 mt-1">{fmt(precoFinal)}</div>
              {desconto > 0 && <div className="text-xs text-neutral-400 mt-1 num">de {fmt(precoBase)} com {desconto}% off</div>}
            </div>
            <div className="grid grid-cols-2 gap-3 mt-3">
              <div className="bg-neutral-50 rounded-lg p-3 text-center">
                <div className="text-[10px] uppercase text-neutral-400">Custo Total</div>
                <div className="text-base font-bold text-navy num mt-1">{fmt(custoTotal)}</div>
              </div>
              <div className="rounded-lg p-3 text-center" style={{ background: margemBg(margemFinal) }}>
                <div className="text-[10px] uppercase text-neutral-400">Margem Final</div>
                <div className="text-base font-bold num mt-1" style={{ color: margemCor(margemFinal) }}>{pct(margemFinal)}</div>
              </div>
              <div className="bg-neutral-50 rounded-lg p-3 text-center col-span-2">
                <div className="text-[10px] uppercase text-neutral-400">Lucro Líquido</div>
                <div className="text-lg font-bold num mt-1" style={{color: C.green}}>{fmt(lucroFinal)}</div>
              </div>
            </div>

            <div className="mt-4 flex gap-2">
              <input type="text" placeholder="Nome da simulação (ex: Sofá Dr. José)" value={nome} onChange={e => setNome(e.target.value)} className="flex-1 text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50" />
              <button onClick={salvar} className="bg-gold-700 hover:bg-gold-dark text-white text-sm font-semibold px-4 py-2 rounded-lg inline-flex items-center gap-1.5"><i className="ti ti-device-floppy" aria-hidden="true" />Salvar</button>
            </div>
          </Card>
        </div>

        {/* Tabela por hora */}
        <Card padding="p-0">
          <div className="px-4 pt-4"><SectionTitle>Preço por Duração (margem {margem}%)</SectionTitle></div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-neutral-50">
                <tr>
                  <th className="text-left text-xs font-semibold text-neutral-500 px-3 py-2.5">Duração</th>
                  <th className="text-right text-xs font-semibold text-neutral-500 px-3 py-2.5">Custo</th>
                  <th className="text-right text-xs font-semibold text-neutral-500 px-3 py-2.5">Preço Ideal</th>
                  <th className="text-right text-xs font-semibold text-neutral-500 px-3 py-2.5 hidden sm:table-cell">Lucro</th>
                </tr>
              </thead>
              <tbody>
                {HORAS_ROW.map(h => {
                  const c = custoHora * h;
                  const p = c / (1 - margem/100);
                  return (
                    <tr key={h} className="border-t border-neutral-100">
                      <td className="px-3 py-2 text-sm font-semibold text-navy num">{h}h</td>
                      <td className="px-3 py-2 text-right text-sm num">{fmt(c)}</td>
                      <td className="px-3 py-2 text-right text-sm font-bold text-navy num">{fmt(p)}</td>
                      <td className="px-3 py-2 text-right text-sm hidden sm:table-cell num" style={{color: C.green}}>{fmt(p - c)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>

        {/* Histórico */}
        {historico.length > 0 && (
          <div>
            <SectionTitle action={<button onClick={() => { if (confirm('Limpar histórico de simulações?')) setHistorico([]); }} className="text-xs text-red-600">Limpar</button>}>
              Histórico de Simulações ({historico.length})
            </SectionTitle>
            <div className="space-y-2">
              {historico.slice(0, 10).map(h => (
                <Card key={h.id} padding="p-3" className="flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-navy truncate">{h.nome}</div>
                    <div className="text-xs text-neutral-500">{h.horas}h · custo R$ {h.custoHora}/h · {new Date(h.data).toLocaleDateString('pt-BR')}</div>
                  </div>
                  <div className="text-right">
                    <div className="font-display num text-base font-bold text-navy">{fmt(h.preco)}</div>
                    <Badge bg={margemBg(h.margemReal)} color={margemCor(h.margemReal)}>{pct(h.margemReal)}</Badge>
                  </div>
                  <button onClick={() => setHistorico(historico.filter(x => x.id !== h.id))} className="text-neutral-300 hover:text-red-500"><i className="ti ti-x" aria-hidden="true" /></button>
                </Card>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  const Slider = ({ label, value, min, max, step, onChange, format }) => (
    <div className="my-3">
      <div className="flex justify-between items-center mb-1.5">
        <label className="text-xs font-semibold text-neutral-600">{label}</label>
        <span className="text-sm font-bold text-navy num">{format ? format(value) : value}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseFloat(e.target.value))} className="w-full" />
    </div>
  );

  // ── Cartão de instalação nativa (Android/Desktop com prompt real, iOS com instruções) ──
  function InstallCard() {
    const { installable, installed, promptInstall } = useInstallPrompt();
    const [status, setStatus] = useState(null);

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    const handleInstall = async () => {
      const outcome = await promptInstall();
      if (outcome === 'accepted') setStatus('ok');
      else if (outcome === 'unavailable') setStatus('manual');
    };

    if (installed) {
      return (
        <Alert type="ok" icon="ti-circle-check">
          <strong>App instalado!</strong> Você está usando o HIGIS como aplicativo nativo — sem barra de navegador, com ícone próprio na tela inicial.
        </Alert>
      );
    }

    return (
      <div className="space-y-3">
        {installable && (
          <button onClick={handleInstall} className="w-full bg-navy hover:bg-navy-800 text-gold-50 font-bold text-sm py-3 rounded-lg inline-flex items-center justify-center gap-2">
            <i className="ti ti-download" aria-hidden="true" /> Instalar HIGIS como App
          </button>
        )}
        {status === 'ok' && <Alert type="ok" icon="ti-circle-check">Instalação concluída. Procure o ícone HIGIS na tela inicial / área de trabalho.</Alert>}

        <div className="text-sm text-neutral-600 leading-relaxed">
          {isIOS ? (
            <div className="mb-2"><strong className="text-navy">📱 No iPhone/iPad:</strong> toque no botão <strong>Compartilhar</strong> (quadrado com seta ↑) na barra do Safari → <em>Adicionar à Tela de Início</em>.</div>
          ) : (
            <div className="mb-2"><strong className="text-navy">📱 No Android:</strong> {installable ? 'use o botão acima, ou' : 'abra'} o menu (⋮) do Chrome → <em>Instalar app</em> / <em>Adicionar à tela inicial</em>.</div>
          )}
          <div className="mb-2"><strong className="text-navy">💻 No PC (Chrome/Edge):</strong> {installable ? 'use o botão acima, ou clique' : 'clique'} no ícone de instalação ⊕ na barra de endereço.</div>
          <div className="text-xs text-neutral-400 mt-3">Após instalar, o HIGIS abre como app nativo, em janela própria, com ícone na tela inicial / área de trabalho — e continua funcionando offline depois da primeira visita.</div>
        </div>
      </div>
    );
  }

  /* ============================================================ */
  /*  SECTION: PRECIFICAÇÃO                                        */
  /* ============================================================ */
  function SectionPrecificacao() {
    const [sub, setSub] = useState(0);
    const SUBS = ['Custos Fixos', 'Depreciação', 'Produtos', 'Diluição'];
    const [custosFixos, setCustosFixos] = usePersistedState('custosFixos', CUSTOS_FIXOS_INI);
    const [depreciacao, setDepreciacao] = usePersistedState('depreciacao', DEPRECIACAO_INI);
    const [produtos, setProdutos] = usePersistedState('produtos', PRODUTOS_INI);
    const [horasDia, setHorasDia] = usePersistedState('horasDia', 6);
    const [diasMes, setDiasMes] = usePersistedState('diasMes', 22);

    const totalFixos = custosFixos.reduce((a, b) => a + (b.valor || 0), 0);
    const totalDep = depreciacao.reduce((a, b) => a + (b.valor || 0), 0);
    const atendMes = horasDia * diasMes;
    const custoPorAtend = totalFixos / atendMes;
    const depMensal = totalDep * 0.0083;
    const depPorAtend = depMensal / atendMes;

    return (
      <div className="space-y-4 fade-up">
        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
          {SUBS.map((s, i) => <Chip key={s} active={sub === i} onClick={() => setSub(i)}>{s}</Chip>)}
        </div>

        {/* KPIs estruturais */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
          <Metric label="Custos Fixos / mês" value={fmtInt(totalFixos)} accent={C.red} icon="ti-receipt" />
          <Metric label="Depreciação Total" value={fmtInt(totalDep)} sub={`${fmt(depMensal)}/mês`} accent={C.amber} icon="ti-tools" />
          <Metric label="Atendimentos / mês" value={atendMes} sub={`${horasDia}h × ${diasMes} dias`} accent={C.navy} icon="ti-calendar-event" />
          <Metric label="Custo por Atendimento" value={fmt(custoPorAtend + depPorAtend)} sub="Fixos + depreciação" accent={C.gold} icon="ti-cash" />
        </div>

        {sub === 0 && <PrecListEditor titulo="Custos Fixos Mensais" data={custosFixos} setData={setCustosFixos} total={totalFixos} sufixo="/mês" />}
        {sub === 1 && <PrecListEditor titulo="Equipamentos (Depreciação)" data={depreciacao} setData={setDepreciacao} total={totalDep} sufixo=" total" />}
        {sub === 2 && <ProdutosEditor produtos={produtos} setProdutos={setProdutos} />}
        {sub === 3 && <DiluicaoCalc produtos={produtos} setProdutos={setProdutos} />}

        {sub === 0 && (
          <Card>
            <SectionTitle>Capacidade Operacional</SectionTitle>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Horas / dia</label>
                <input type="number" value={horasDia} onChange={e => setHorasDia(parseInt(e.target.value) || 0)} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
              </div>
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Dias / mês</label>
                <input type="number" value={diasMes} onChange={e => setDiasMes(parseInt(e.target.value) || 0)} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
              </div>
            </div>
          </Card>
        )}
      </div>
    );
  }

  function PrecListEditor({ titulo, data, setData, total, sufixo }) {
    const [novo, setNovo] = useState({ nome: '', valor: '' });
    const upd = (id, field, val) => setData(data.map(r => r.id === id ? { ...r, [field]: val } : r));
    const del = id => setData(data.filter(r => r.id !== id));
    const add = () => {
      if (!novo.nome) return;
      setData([...data, { id: Date.now(), nome: novo.nome, valor: parseFloat(novo.valor) || 0 }]);
      setNovo({ nome: '', valor: '' });
    };
    return (
      <Card>
        <SectionTitle action={<div className="font-display num text-lg font-bold text-navy">{fmt(total)}<span className="text-xs text-neutral-400 font-normal">{sufixo}</span></div>}>
          {titulo}
        </SectionTitle>
        <div className="space-y-1.5">
          {data.map(r => (
            <div key={r.id} className="flex items-center gap-2 py-1.5 border-b border-neutral-100">
              <EditableValue value={r.nome} type="text" onCommit={v => upd(r.id, 'nome', v)} className="flex-1 text-sm" />
              <div className="w-32"><EditableValue value={r.valor} onCommit={v => upd(r.id, 'valor', v)} prefix="R$ " className="text-right font-semibold" /></div>
              <button onClick={() => del(r.id)} className="text-neutral-300 hover:text-red-500"><i className="ti ti-trash text-sm" aria-hidden="true" /></button>
            </div>
          ))}
        </div>
        <div className="flex items-center gap-2 mt-3 pt-3 border-t border-neutral-200">
          <input type="text" placeholder="Nome" value={novo.nome} onChange={e => setNovo({...novo, nome: e.target.value})} className="flex-1 text-sm px-3 py-2 rounded-lg border border-neutral-200" />
          <input type="number" step="0.01" placeholder="R$" value={novo.valor} onChange={e => setNovo({...novo, valor: e.target.value})} className="w-28 text-sm px-3 py-2 rounded-lg border border-neutral-200 num text-right" />
          <button onClick={add} className="bg-navy text-gold-50 px-3 py-2 rounded-lg text-sm"><i className="ti ti-plus" aria-hidden="true" /></button>
        </div>
      </Card>
    );
  }

  function ProdutosEditor({ produtos, setProdutos }) {
    const [filtro, setFiltro] = useState('Todos');
    const [showAdd, setShowAdd] = useState(false);
    const [novo, setNovo] = useState({ serv: 'Higienização', nome: '', valor: '', litros: '', unidTipo: 'L', usadas: '' });
    const SERVS = ['Todos', 'Higienização', 'Impermeabilização', 'Blindagem', 'Couro', 'Tapete'];
    const SERVS_EDIT = ['Higienização', 'Impermeabilização', 'Blindagem', 'Couro', 'Tapete'];

    const upd = (id, field, val) => setProdutos(produtos.map(p => p.id === id ? { ...p, [field]: val } : p));
    const del = id => { if (confirm('Remover este produto?')) setProdutos(produtos.filter(p => p.id !== id)); };
    const lista = produtos.filter(p => filtro === 'Todos' || p.serv === filtro);

    const add = () => {
      if (!novo.nome) { alert('Informe o nome do produto.'); return; }
      const valor = parseFloat(novo.valor) || 0;
      const litros = parseFloat(novo.litros) || 0;
      if (valor <= 0 || litros <= 0) { alert('Valor e volume precisam ser maiores que zero.'); return; }
      setProdutos([...produtos, {
        id: Date.now(),
        serv: novo.serv,
        nome: novo.nome,
        valor,
        litros,
        unidTipo: novo.unidTipo,
        usadas: parseInt(novo.usadas) || 1,
      }]);
      setNovo({ serv: 'Higienização', nome: '', valor: '', litros: '', unidTipo: 'L', usadas: '' });
      setShowAdd(false);
    };

    const reset = () => {
      if (confirm('Restaurar a tabela original de produtos G&S/CNX? Suas edições serão perdidas.')) {
        setProdutos(PRODUTOS_INI);
      }
    };

    return (
      <>

  function DiluicaoCalc({ produtos, setProdutos }) {
    const [prodId, setProdId] = useState(produtos[0]?.id || 1);
    const [ratio, setRatio] = useState(10);
    const [ratioCustom, setRatioCustom] = useState(false);
    const [volume, setVolume] = useState(1000);
    const [showAdd, setShowAdd] = useState(false);
    const [novo, setNovo] = useState({ serv: 'Higienização', nome: '', valor: '', litros: '', unidTipo: 'L', usadas: '' });
    const SERVS_EDIT = ['Higienização', 'Impermeabilização', 'Blindagem', 'Couro', 'Tapete'];

    const prod = produtos.find(p => p.id === prodId) || produtos[0];
    const totalMl = prod ? (prod.unidTipo === 'L' ? prod.litros * 1000 : prod.litros) : 1000;
    const custoMl = prod && totalMl > 0 ? prod.valor / totalMl : 0;
    const concMl = volume / (ratio + 1);
    const aguaMl = volume - concMl;
    const custoTotal = concMl * custoMl;
    const rendimento = totalMl * (ratio + 1);

    const updProd = (field, val) => {
      if (!prod) return;
      setProdutos(produtos.map(p => p.id === prod.id ? { ...p, [field]: val } : p));
    };

    const delProd = () => {
      if (!prod) return;
      if (confirm(`Remover o produto "${prod.nome}" do catálogo?`)) {
        const novos = produtos.filter(p => p.id !== prod.id);
        setProdutos(novos);
        if (novos.length > 0) setProdId(novos[0].id);
      }
    };

    const addProd = () => {
      if (!novo.nome) { alert('Informe o nome do produto.'); return; }
      const valor = parseFloat(novo.valor) || 0;
      const litros = parseFloat(novo.litros) || 0;
      if (valor <= 0 || litros <= 0) { alert('Valor e volume precisam ser maiores que zero.'); return; }
      const id = Date.now();
      setProdutos([...produtos, {
        id, serv: novo.serv, nome: novo.nome, valor, litros,
        unidTipo: novo.unidTipo, usadas: parseInt(novo.usadas) || 1,
      }]);
      setProdId(id); // seleciona o novo
      setNovo({ serv: 'Higienização', nome: '', valor: '', litros: '', unidTipo: 'L', usadas: '' });
      setShowAdd(false);
    };

    return (
      <>
        <Card>
          <SectionTitle action={<button onClick={() => setShowAdd(true)} className="bg-navy text-gold-50 text-xs font-semibold px-3 py-1.5 rounded-lg inline-flex items-center gap-1.5"><i className="ti ti-plus" aria-hidden="true" />Novo Produto</button>}>
            Calculadora de Diluição
          </SectionTitle>

          {/* Seletor de produto */}
          <div className="mb-3">
            <label className="text-xs font-semibold text-neutral-600 block mb-1">Produto</label>
            <div className="flex gap-2">
              <select value={prodId} onChange={e => setProdId(parseInt(e.target.value))} className="flex-1 text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50">
                {produtos.map(p => <option key={p.id} value={p.id}>{p.nome} ({p.serv})</option>)}
              </select>
              {prod && (
                <button onClick={delProd} title="Remover este produto do catálogo" className="bg-red-50 text-red-700 border border-red-200 px-3 rounded-lg inline-flex items-center">
                  <i className="ti ti-trash text-sm" aria-hidden="true" />
                </button>
              )}
            </div>
          </div>

          {/* Edição inline do produto selecionado */}
          {prod && (
            <div className="bg-sand-50 rounded-lg p-3 mb-3 border border-sand-200">
              <div className="text-[10px] uppercase tracking-wider text-neutral-500 font-bold mb-2 flex items-center gap-1">
                <i className="ti ti-pencil text-gold" aria-hidden="true" />
                Editar dados do produto (clique nos campos)
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                  <label className="text-[10px] font-semibold text-neutral-500 block mb-0.5">Nome</label>
                  <EditableValue value={prod.nome} type="text" onCommit={v => updProd('nome', v)} className="text-sm font-semibold text-navy" />
                </div>
                <div>
                  <label className="text-[10px] font-semibold text-neutral-500 block mb-0.5">Categoria</label>
                  <select value={prod.serv} onChange={e => updProd('serv', e.target.value)} className="w-full text-sm px-2 py-1 rounded border border-neutral-200 bg-white">
                    {SERVS_EDIT.map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-semibold text-neutral-500 block mb-0.5">Valor da embalagem</label>
                  <EditableValue value={prod.valor} onCommit={v => updProd('valor', v)} prefix="R$ " className="text-sm font-semibold text-navy" />
                </div>
                <div>
                  <label className="text-[10px] font-semibold text-neutral-500 block mb-0.5">Volume da embalagem</label>
                  <div className="flex items-center gap-1">
                    <div className="flex-1"><EditableValue value={prod.litros} onCommit={v => updProd('litros', v)} className="text-sm font-semibold text-navy" /></div>
                    <select value={prod.unidTipo} onChange={e => updProd('unidTipo', e.target.value)} className="text-xs px-2 py-1 rounded border border-neutral-200 bg-white">
                      <option value="L">L</option>
                      <option value="ml">ml</option>
                    </select>
                  </div>
                </div>
              </div>
              <div className="text-[10px] text-neutral-400 mt-2 num">
                Equivale a <strong className="text-gold-700">R$ {custoMl.toFixed(4)}/ml</strong> de concentrado
              </div>
            </div>
          )}

          {/* Parâmetros de diluição */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-semibold text-neutral-600 block mb-1">Diluição (1 parte de concentrado : X de água)</label>
              {!ratioCustom ? (
                <div className="flex gap-2">
                  <select value={ratio} onChange={e => setRatio(parseInt(e.target.value))} className="flex-1 text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50">
                    {DILUICOES.map(d => <option key={d.ratio} value={d.ratio}>{d.label}</option>)}
                  </select>
                  <button onClick={() => setRatioCustom(true)} className="text-xs text-neutral-500 hover:text-navy px-2">Custom</button>
                </div>
              ) : (
                <div className="flex gap-2 items-center">
                  <span className="text-sm text-neutral-600 num">1 :</span>
                  <input type="number" value={ratio} onChange={e => setRatio(parseInt(e.target.value) || 1)} min="1" className="flex-1 text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
                  <button onClick={() => setRatioCustom(false)} className="text-xs text-neutral-500 hover:text-navy px-2">Presets</button>
                </div>
              )}
            </div>
            <div>
              <label className="text-xs font-semibold text-neutral-600 block mb-1">Volume final desejado (ml)</label>
              <input type="number" value={volume} onChange={e => setVolume(parseFloat(e.target.value) || 0)} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
            </div>
          </div>

          <div className="mt-4 grid grid-cols-2 gap-3">
            <div className="bg-gold-light rounded-lg p-3 text-center">
              <div className="text-[10px] uppercase text-neutral-500">Concentrado</div>
              <div className="font-display num text-xl font-bold text-gold-700 mt-1">{concMl.toFixed(0)} ml</div>
            </div>
            <div className="bg-blue-50 rounded-lg p-3 text-center">
              <div className="text-[10px] uppercase text-neutral-500">Água</div>
              <div className="font-display num text-xl font-bold text-blue-700 mt-1">{aguaMl.toFixed(0)} ml</div>
            </div>
            <div className="bg-neutral-50 rounded-lg p-3 text-center col-span-2">
              <div className="text-[10px] uppercase text-neutral-500">Custo desta diluição</div>
              <div className="font-display num text-2xl font-bold text-navy mt-1">{fmt(custoTotal)}</div>
              <div className="text-xs text-neutral-500 mt-1 num">Rendimento total da embalagem: {(rendimento/1000).toFixed(1)} L de solução pronta</div>
            </div>
          </div>
        </Card>

        <Modal open={showAdd} onClose={() => setShowAdd(false)} title="Novo Produto — Catálogo de Insumos">
          <div className="space-y-3">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Categoria de serviço</label>
                <select value={novo.serv} onChange={e => setNovo({...novo, serv: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50">
                  {SERVS_EDIT.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Nome do produto</label>
                <input type="text" placeholder="Ex: Limpador Alcalino 5L" value={novo.nome} onChange={e => setNovo({...novo, nome: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50" />
              </div>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Valor (R$)</label>
                <input type="number" step="0.01" placeholder="0,00" value={novo.valor} onChange={e => setNovo({...novo, valor: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
              </div>
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Volume</label>
                <input type="number" step="0.01" placeholder="5" value={novo.litros} onChange={e => setNovo({...novo, litros: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
              </div>
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Unidade</label>
                <select value={novo.unidTipo} onChange={e => setNovo({...novo, unidTipo: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50">
                  <option value="L">Litros</option>
                  <option value="ml">Mililitros</option>
                </select>
              </div>
              <div>
                <label className="text-xs font-semibold text-neutral-600 block mb-1">Usos / emb.</label>
                <input type="number" placeholder="50" value={novo.usadas} onChange={e => setNovo({...novo, usadas: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50 num" />
              </div>
            </div>
            <button onClick={addProd} className="w-full bg-navy text-gold-50 font-semibold py-2.5 rounded-lg inline-flex items-center justify-center gap-2">
              <i className="ti ti-flask-filled" aria-hidden="true" />Adicionar e Selecionar

  /* ============================================================ */
  /*  SECTION: FINANCEIRO                                          */
  /* ============================================================ */
  function SectionFinanceiro() {
    const [combos, setCombos] = useState(3);
    const [outros, setOutros] = useState(0);
    const [custosVar, setCustosVar] = useState(1200);

    const faturamento = combos * METAS.ticketCombo + outros;
    const liquido = faturamento - custosVar;
    const sobra = liquido - METAS.parcela;

    return (
      <div className="space-y-4 fade-up">
        <Alert type="danger" icon="ti-alert-octagon">
          <strong>Parcela:</strong> R$ 2.680/mês a partir de 30/05/2026 (12×). <strong>Reserva técnica de R$ 16.000 é INVIOLÁVEL</strong> — só toca em caso de emergência absoluta com Higia/aprovação.
        </Alert>

        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
          <Metric label="Parcela Mensal" value={fmtInt(METAS.parcela)} accent={C.red} icon="ti-alert-triangle" />
          <Metric label="Reserva Técnica" value={fmtInt(METAS.reserva)} accent={C.purple} icon="ti-shield-lock" />
          <Metric label="Ticket Alvo" value={fmtInt(METAS.ticketCombo)} accent={C.gold} icon="ti-target" />
          <Metric label="Meta Mensal" value={`${METAS.combosMin} Combos`} sub="Mínimo para cobrir" accent={C.green} icon="ti-award" />
        </div>

        <Card>
          <SectionTitle>Simulador de Caixa Mensal</SectionTitle>
          <Slider label="Combos Premium fechados" value={combos} min={0} max={15} step={1} onChange={setCombos} format={v => `${v} × R$ 1.200`} />
          <Slider label="Outros serviços (R$)" value={outros} min={0} max={20000} step={100} onChange={setOutros} format={v => fmtInt(v)} />
          <Slider label="Custos variáveis estimados" value={custosVar} min={0} max={10000} step={100} onChange={setCustosVar} format={v => fmtInt(v)} />

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mt-4">
            <div className="bg-gold-light rounded-lg p-3 text-center">
              <div className="text-[10px] uppercase text-neutral-500">Faturamento</div>
              <div className="font-display num text-lg font-bold text-gold-700 mt-1">{fmtInt(faturamento)}</div>
            </div>
            <div className="bg-amber-50 rounded-lg p-3 text-center">
              <div className="text-[10px] uppercase text-neutral-500">- Custos Variáveis</div>
              <div className="font-display num text-lg font-bold text-amber-700 mt-1">{fmtInt(custosVar)}</div>
            </div>
            <div className="bg-blue-50 rounded-lg p-3 text-center">
              <div className="text-[10px] uppercase text-neutral-500">Líquido</div>
              <div className="font-display num text-lg font-bold text-navy mt-1">{fmtInt(liquido)}</div>
            </div>
            <div className="rounded-lg p-3 text-center" style={{ background: sobra >= 0 ? C.greenL : C.redL }}>
              <div className="text-[10px] uppercase text-neutral-500">Sobra após parcela</div>
              <div className="font-display num text-lg font-bold mt-1" style={{ color: sobra >= 0 ? C.green : C.red }}>{fmtInt(sobra)}</div>
            </div>
          </div>

          {sobra < 0 && (
            <Alert type="danger" icon="ti-alert-circle">
              Cenário insuficiente para cobrir a parcela. Faltam <strong>{fmtInt(Math.abs(sobra))}</strong>. Risco de tocar na reserva técnica — <strong>inviolável</strong>.
            </Alert>
          )}
          {sobra >= 0 && sobra < 1000 && (
            <Alert type="warn" icon="ti-alert-triangle">Cenário no fio da navalha. Margem de segurança apertada — busque +1 Combo Premium ou contrato B2B.</Alert>
          )}
          {sobra >= 1000 && (
            <Alert type="ok" icon="ti-check">Cenário saudável. Reserva técnica preservada. Sobra de <strong>{fmtInt(sobra)}</strong> disponível para reinvestimento.</Alert>
          )}
        </Card>
      </div>
    );
  }
