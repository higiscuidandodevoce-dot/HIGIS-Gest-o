  function SectionParceiros() {
    const [cat, setCat] = useState('Todos');
    const lista = PARCEIROS_B2B.filter(p => cat === 'Todos' || p.cat === cat);

    const prioColor = p => p === 'Alta' ? C.green : p === 'Permuta' ? C.gold : C.amber;
    const prioBg = p => p === 'Alta' ? C.greenL : p === 'Permuta' ? C.goldL : C.amberL;

    return (
      <div className="space-y-4 fade-up">
        <Alert type="premium" icon="ti-building-store">
          Rede de prospecção qualificada para a Classe A/B do Vale do São Francisco. <strong>Barbearias = território de prospecção cativo</strong> (cliente em cadeira, 15-30min de exposição).
        </Alert>

        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
          {CATS_PAR.map(c => <Chip key={c} active={cat === c} onClick={() => setCat(c)}>{c}</Chip>)}
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
          {lista.map((p, i) => (
            <Card key={i} accent={prioColor(p.prio)}>
              <div className="flex items-start justify-between mb-2">
                <div className="flex-1 min-w-0">
                  <div className="font-display font-bold text-navy text-sm">{p.nome}</div>
                  <div className="text-xs text-neutral-500">{p.cidade}</div>
                </div>
                <Badge bg={prioBg(p.prio)} color={prioColor(p.prio)}>{p.prio}</Badge>
              </div>
              <div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Gancho</div>
              <div className="text-xs text-navy leading-relaxed">{p.gancho}</div>
              <div className="text-[10px] text-gold-700 mt-2 font-semibold">{p.cat}</div>
            </Card>
          ))}
        </div>
      </div>
    );
  }

  /* ============================================================ */
  /*  SECTION: CONFIGURAÇÕES                                       */
  /* ============================================================ */
  function SectionConfig() {
    const [empresa, setEmpresa] = usePersistedState('cfg.empresa', { nome: 'HIGIS Group', sub: 'Central de Gestão Concierge' });
    const themeCtx = useTheme();
    const fileInputRef = useRef(null);

    const onLogoSelect = e => {
      const file = e.target.files?.[0];
      if (!file) return;
      if (file.size > 1024 * 1024) { alert('Imagem muito grande. Use até 1MB (PNG, JPG ou SVG).'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        themeCtx.setLogo(reader.result);
      };
      reader.readAsDataURL(file);
    };

    const removeLogo = () => {
      if (confirm('Remover a logo atual? O símbolo "H" voltará a ser exibido.')) {
        themeCtx.setLogo(null);
      }
    };

    const exportar = () => {
      const data = storage.export();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `higis-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    };

    const importar = e => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (confirm('Substituir TODOS os dados atuais com este backup? Esta ação é irreversível.')) {
            storage.import(data);
            location.reload();
          }
        } catch { alert('Arquivo inválido.'); }
      };
      reader.readAsText(file);
    };

    const resetAll = () => {
      if (confirm('⚠ Apagar TODOS os dados do app? Isso restaura ao estado inicial. Considere exportar antes.')) {
        if (confirm('Tem certeza absoluta? Esta ação NÃO pode ser desfeita.')) {
          storage.clear();
          location.reload();
        }
      }
    };

    return (
      <div className="space-y-4 fade-up">
        {/* IDENTIDADE */}
        <Card>
          <SectionTitle>Identidade da Empresa</SectionTitle>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-semibold text-neutral-600 block mb-1">Nome</label>
              <input type="text" value={empresa.nome} onChange={e => setEmpresa({...empresa, nome: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50" />
            </div>
            <div>
              <label className="text-xs font-semibold text-neutral-600 block mb-1">Subtítulo</label>
              <input type="text" value={empresa.sub} onChange={e => setEmpresa({...empresa, sub: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border border-neutral-200 bg-neutral-50" />
            </div>
          </div>
        </Card>

        {/* LOGO */}
        <Card>
          <SectionTitle>Logomarca</SectionTitle>
          <div className="flex items-center gap-4 flex-wrap">
            <div className="w-20 h-20 rounded-2xl shadow-concierge bg-white flex items-center justify-center overflow-hidden border border-neutral-100" style={{ background: themeCtx.theme.primary }}>
              {themeCtx.logo
                ? <img src={themeCtx.logo} alt="Logo HIGIS" className="w-full h-full object-contain bg-white" />
                : <span className="font-display text-4xl font-bold" style={{ color: themeCtx.theme.accent }}>H</span>
              }
            </div>
            <div className="flex-1 min-w-[200px]">
              <div className="text-sm font-semibold text-navy mb-1">{themeCtx.logo ? 'Logo personalizada ativa' : 'Símbolo padrão "H"'}</div>
              <div className="text-xs text-neutral-500 leading-relaxed mb-2">Formatos: PNG (com fundo transparente), JPG ou SVG. Limite 1MB. Aparece na sidebar, topbar e tela de carregamento.</div>
              <div className="flex gap-2 flex-wrap">
                <button onClick={() => fileInputRef.current?.click()} className="bg-navy text-gold-50 text-sm font-semibold px-4 py-2 rounded-lg inline-flex items-center gap-1.5">
                  <i className="ti ti-upload" aria-hidden="true" />{themeCtx.logo ? 'Trocar Logo' : 'Enviar Logo'}
                </button>
                {themeCtx.logo && (
                  <button onClick={removeLogo} className="bg-red-50 text-red-700 border border-red-200 text-sm font-semibold px-4 py-2 rounded-lg inline-flex items-center gap-1.5">
                    <i className="ti ti-trash" aria-hidden="true" />Remover
                  </button>
                )}
              </div>
              <input ref={fileInputRef} type="file" accept="image/png,image/jpeg,image/svg+xml" onChange={onLogoSelect} className="hidden" />
            </div>
          </div>
        </Card>

        {/* PALETA */}
        <Card>
          <SectionTitle>Paleta de Cores</SectionTitle>
          <p className="text-xs text-neutral-500 mb-3">A paleta define a cor da sidebar, dos acentos dourados, dos botões principais e das tags. O <strong>HIGIS Clássico</strong> é a identidade oficial — as demais variantes são para campanhas sazonais ou editorial Casa Sertão.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
            {Object.entries(THEMES).map(([key, t]) => {
              const active = themeCtx.themeKey === key;
              return (
                <button
                  key={key}
                  onClick={() => themeCtx.setThemeKey(key)}
                  className={`text-left rounded-xl p-3 border-2 transition-all ${active ? 'border-gold shadow-concierge-lg' : 'border-neutral-200 hover:border-neutral-300'}`}
                  style={{ background: '#fff' }}
                >
                  {/* Preview do tema */}
                  <div className="rounded-lg overflow-hidden mb-3" style={{ background: t.primary }}>
                    <div className="flex items-center gap-2 p-3">
                      <div className="w-7 h-7 rounded-md flex items-center justify-center font-display font-bold text-white text-base" style={{ background: t.accent }}>H</div>
                      <div className="text-xs font-display font-bold" style={{ color: t.textOnPrimary }}>HIGIS</div>
                    </div>
                    <div className="flex">
                      <div className="flex-1 h-2" style={{ background: t.primaryDark }}></div>
                      <div className="w-1/3 h-2" style={{ background: t.accent }}></div>
                      <div className="w-1/4 h-2" style={{ background: t.accentLight }}></div>
                    </div>
                  </div>
                  <div className="flex items-center justify-between">
                    <div>
                      <div className="font-display font-bold text-navy text-sm">{t.name}</div>
                      <div className="text-[11px] text-neutral-500">{t.sub}</div>
                    </div>
                    {active && <i className="ti ti-circle-check-filled text-gold text-xl shrink-0" aria-hidden="true" />}
                  </div>
                </button>
              );
            })}
          </div>
          <Alert type="info" icon="ti-palette">
            A troca de paleta atualiza imediatamente a sidebar, o cabeçalho e os acentos dourados em todo o app. Outras cores funcionais (verde de margem positiva, vermelho de alerta, etc.) permanecem fixas para manter clareza visual.
          </Alert>
        </Card>

        {/* BACKUP */}
        <Card>
          <SectionTitle>Backup e Sincronização</SectionTitle>
          <Alert type="info" icon="ti-cloud">
            Os dados estão salvos <strong>localmente</strong> neste navegador/celular. Para sincronizar entre celular e PC, exporte daqui e importe no outro device — ou aguarde a v2 com Supabase (sync automático).
          </Alert>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mt-3">
            <button onClick={exportar} className="bg-navy text-gold-50 font-semibold text-sm py-2.5 rounded-lg inline-flex items-center justify-center gap-2">
              <i className="ti ti-download" aria-hidden="true" /> Exportar Backup (.json)
            </button>
            <label className="bg-white border border-navy text-navy font-semibold text-sm py-2.5 rounded-lg inline-flex items-center justify-center gap-2 cursor-pointer">
              <i className="ti ti-upload" aria-hidden="true" /> Importar Backup
              <input type="file" accept=".json" onChange={importar} className="hidden" />
            </label>
            <button onClick={resetAll} className="bg-red-50 text-red-700 border border-red-200 font-semibold text-sm py-2.5 rounded-lg inline-flex items-center justify-center gap-2">
              <i className="ti ti-trash" aria-hidden="true" /> Resetar Tudo
            </button>
          </div>
        </Card>

        <Card>
          <SectionTitle>Sobre</SectionTitle>
          <div className="space-y-1 text-sm text-neutral-600">
            <div><strong className="text-navy">HIGIS Group</strong> · CNPJ 24.135.828/0001-15</div>
            <div>Petrolina-PE · Vale do São Francisco</div>
            <div className="text-xs text-neutral-400 mt-2">Curadoria Técnica · Preservação de Patrimônio · Blindagem HIGIS · Gestão Concierge AA</div>
            <div className="text-xs text-neutral-400">Versão 1.3.1 · PWA instalável · Deploy em GitHub Pages / Vercel</div>
          </div>
        </Card>

        <Card>
          <SectionTitle>Instalação como App</SectionTitle>
          <InstallCard />
        </Card>
      </div>
    );
  }

  /* ============================================================ */
  /*  LAYOUT: SIDEBAR (desktop) + BOTTOM NAV (mobile) + TOPBAR     */
  /* ============================================================ */
  function Sidebar({ current, onChange, empresa }) {
    const ctx = useTheme();
    const theme = ctx.theme;
    return (
      <aside className="hidden lg:flex flex-col w-64 xl:w-72 h-screen sticky top-0 shrink-0" style={{ background: theme.primary, color: theme.textOnPrimary }}>
        {/* Logo */}
        <div className="px-6 py-6 border-b border-white/10">
          <div className="flex items-center gap-3">
            <LogoMark size={44} rounded={12} />
            <div className="min-w-0">
              <div className="font-display text-lg font-bold leading-tight truncate" style={{ color: theme.textOnPrimary }}>{empresa.nome}</div>
              <div className="text-[10px] tracking-widest uppercase text-white/40 truncate">{empresa.sub}</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav className="flex-1 overflow-y-auto py-4 px-3">
          {NAV.map(n => {
            const active = current === n.id;
            return (
              <button
                key={n.id}
                onClick={() => onChange(n.id)}
                className="nav-item w-full text-left px-3 py-2.5 rounded-lg mb-1 flex items-center gap-3 transition-colors"
                style={active ? { background: theme.accent + '22', color: theme.accent } : { color: 'rgba(255,255,255,0.7)' }}
              >
                <i className={`ti ${n.icon} text-lg shrink-0`} style={active ? { color: theme.accent } : {}} aria-hidden="true" />
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold" style={active ? { color: theme.accent } : { color: 'rgba(255,255,255,0.9)' }}>{n.label}</div>
                  <div className="text-[10px] text-white/40 truncate">{n.desc}</div>
                </div>
              </button>
            );
          })}
        </nav>

        {/* Footer */}
        <div className="px-6 py-4 border-t border-white/10 text-[10px] text-white/40">
          <div className="font-display mb-0.5" style={{ color: theme.textOnPrimary }}>Petrolina, PE</div>
          <div>HIGIS Group · v1.3.1</div>
        </div>
      </aside>
    );
  }

  function BottomNav({ current, onChange }) {
    const theme = useTheme().theme;
    // Mobile: limita aos 5 principais; resto via "Mais"
    const main = ['dashboard', 'tabelas', 'planos', 'simulador', 'config'];
    const items = NAV.filter(n => main.includes(n.id));
    return (
      <nav className="lg:hidden fixed bottom-0 left-0 right-0 border-t border-white/10 z-40 no-print" style={{ background: theme.primary, paddingBottom: 'env(safe-area-inset-bottom, 0)' }}>
        <div className="flex">
          {items.map(n => (
            <button
              key={n.id}
              onClick={() => onChange(n.id)}
              className="flex-1 py-2.5 px-1 flex flex-col items-center gap-0.5 transition-colors"
              style={{ color: current === n.id ? theme.accent : 'rgba(255,255,255,0.45)' }}
            >
              <i className={`ti ${n.icon} text-lg`} aria-hidden="true" />
              <span className="text-[9px] font-semibold tracking-wide">{n.label}</span>
            </button>
          ))}
        </div>
      </nav>
    );
  }

  function TopBar({ current, empresa, onMenuClick }) {
    const theme = useTheme().theme;
    const item = NAV.find(n => n.id === current);
    const date = useDate();
    return (
      <header className="lg:hidden px-4 py-3 flex items-center gap-3 sticky top-0 z-30 shadow-md" style={{ background: theme.primary, color: theme.textOnPrimary }}>
        <button onClick={onMenuClick} style={{ color: theme.textOnPrimary }}>
          <i className="ti ti-menu-2 text-xl" aria-hidden="true" />
        </button>
        <LogoMark size={32} rounded={8} />
        <div className="flex-1 min-w-0">
          <div className="font-display text-base font-bold truncate" style={{ color: theme.textOnPrimary }}>{item?.label || empresa.nome}</div>
          <div className="text-[10px] text-white/40 truncate">{item?.desc}</div>
        </div>
        <div className="text-right text-[10px] text-white/50 shrink-0">
          <div className="font-display" style={{ color: theme.textOnPrimary }}>Petrolina, PE</div>
          <div className="num">{date.toLocaleDateString('pt-BR')}</div>
        </div>
      </header>
    );
  }

  // Mobile drawer (para sub-menus em mobile)
  function MobileDrawer({ open, onClose, current, onChange }) {
    const theme = useTheme().theme;
    if (!open) return null;
    return (
      <div className="lg:hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm" onClick={onClose}>
        <aside className="w-72 max-w-[85vw] h-full p-5 fade-up" style={{ background: theme.primary, color: theme.textOnPrimary }} onClick={e => e.stopPropagation()}>
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-2"><LogoMark size={32} rounded={8} /><div className="font-display text-xl font-bold" style={{ color: theme.textOnPrimary }}>Menu</div></div>
            <button onClick={onClose} style={{ color: theme.textOnPrimary }}><i className="ti ti-x text-xl" aria-hidden="true" /></button>
          </div>
          {NAV.map(n => {
            const active = current === n.id;
            return (
              <button
                key={n.id}
                onClick={() => { onChange(n.id); onClose(); }}
                className="w-full text-left px-3 py-2.5 rounded-lg mb-1 flex items-center gap-3"
                style={active ? { background: theme.accent + '22', color: theme.accent } : { color: 'rgba(255,255,255,0.7)' }}
              >
                <i className={`ti ${n.icon} text-lg`} aria-hidden="true" />
                <span className="text-sm font-semibold">{n.label}</span>
              </button>
            );
          })}
        </aside>
      </div>
    );
  }

  /* ============================================================ */
  /*  MAIN APP                                                     */
  /* ============================================================ */
  function App() {
    const [current, setCurrent] = usePersistedState('nav.current', 'dashboard');
    const [drawerOpen, setDrawerOpen] = useState(false);
    const [empresa] = usePersistedState('cfg.empresa', { nome: 'HIGIS Group', sub: 'Central de Gestão Concierge' });
    const [themeKey, setThemeKey] = usePersistedState('cfg.theme', 'higis-classic');
    const [logo, setLogo] = usePersistedState('cfg.logo', null);
    const theme = THEMES[themeKey] || THEMES['higis-classic'];

    // Injeta CSS vars e atualiza meta theme-color do navegador
    useEffect(() => {
      const r = document.documentElement.style;
      r.setProperty('--c-primary', theme.primary);
      r.setProperty('--c-accent', theme.accent);
      r.setProperty('--c-accent-light', theme.accentLight);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme.primary);
    }, [theme]);

    const renderSection = () => {
      switch (current) {
        case 'dashboard':    return <SectionDashboard />;
        case 'tabelas':      return <SectionTabelas />;
        case 'planos':       return <SectionPlanos />;
        case 'simulador':    return <SectionSimulador />;
        case 'precificacao': return <SectionPrecificacao />;
        case 'financeiro':   return <SectionFinanceiro />;
        case 'parceiros':    return <SectionParceiros />;
        case 'config':       return <SectionConfig />;
        default:             return <SectionDashboard />;
      }
    };

    const item = NAV.find(n => n.id === current);

    return (
      <ThemeContext.Provider value={{ theme, themeKey, setThemeKey, logo, setLogo }}>
        <div className="flex min-h-screen bg-sand-50">
          <Sidebar current={current} onChange={setCurrent} empresa={empresa} />

          <div className="flex-1 min-w-0 flex flex-col">
            <TopBar current={current} empresa={empresa} onMenuClick={() => setDrawerOpen(true)} />

            {/* Desktop section header */}
            <div className="hidden lg:block bg-white border-b border-neutral-100 px-8 py-5">
              <div className="max-w-7xl mx-auto">
                <div className="font-display text-2xl font-bold text-navy">{item?.label}</div>
                <div className="text-sm text-neutral-500">{item?.desc}</div>
              </div>
            </div>

            <main className="flex-1 px-4 md:px-6 lg:px-8 py-4 md:py-6 lg:py-8 pb-24 lg:pb-12">
              <div className="max-w-7xl mx-auto w-full">
                {renderSection()}
              </div>
            </main>

            {/* Footer apenas desktop */}
            <footer className="hidden lg:block px-8 py-4 text-center text-[10px] text-neutral-400 border-t border-neutral-100">
              HIGIS Group · CNPJ 24.135.828/0001-15 · Petrolina-PE · Curadoria Técnica · Preservação de Patrimônio · <strong>v1.3.1</strong>
            </footer>
          </div>

          <BottomNav current={current} onChange={setCurrent} />
          <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} current={current} onChange={setCurrent} />
        </div>
      </ThemeContext.Provider>
    );
  }

  /* ============================================================ */
  /*  MOUNT                                                        */
  /* ============================================================ */
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  setTimeout(() => { const s = document.getElementById('splash'); if (s) { s.classList.add('gone'); setTimeout(() => s.remove(), 500); } }, 300);
  </script>

  <!-- PWA: registro do Service Worker externo (cache-first, funciona offline) -->
  <script>
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // Captura o evento de instalação (Android/Desktop Chrome/Edge) para
    // disponibilizar um botão "Instalar App" dentro da tela de Configurações.
    window.__higisInstallEvent = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window.__higisInstallEvent = e;
      window.dispatchEvent(new CustomEvent('higis:installable'));
    });
  </script>
</body>
</html>
